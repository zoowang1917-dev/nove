name: novel_ai_app
description: 三省六部 × InkOS — AI网文创作平台（纯本地，直连LLM）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── 状态管理 ─────────────────────────
  flutter_riverpod: ^2.5.1

  # ── 路由 ──────────────────────────────
  go_router: ^13.2.5

  # ── 网络（直连 LLM API）──────────────
  http: ^1.2.1

  # ── 本地存储 ──────────────────────────
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ── UI / 动画 ──────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # ── 文件操作 ───────────────────────────
  share_plus: ^9.0.0

  # ── 通知 ──────────────────────────────
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # ── 设备 ──────────────────────────────
  device_info_plus: ^10.1.0
  wakelock_plus: ^1.2.5
  permission_handler: ^11.3.1

  # ── 工具 ──────────────────────────────
  uuid: ^4.4.0
  logger: ^2.4.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: false

  assets:
    - assets/images/
    - assets/fonts/

  # ── 字体（可选）──────────────────────
  # 如果有 NotoSerifSC 字体文件，取消下面的注释
  # 没有字体文件时，App 会使用系统字体，功能正常
  # fonts:
  #   - family: NotoSerifSC
  #     fonts:
  #       - asset: assets/fonts/NotoSerifSC-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/NotoSerifSC-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/NotoSerifSC-SemiBold.ttf
  #         weight: 600
  dependency_overrides:
  package_info_plus: ^4.3.0
