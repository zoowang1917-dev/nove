name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      # 【核心修复】：删掉不小心传上来的本地路径配置文件，防止云端找错路径！
      - name: Clean up bad local properties
        run: rm -f android/local.properties

      - name: Install dependencies
        run: flutter pub get

      # 把长命令合并为单行，避免换行符导致的报错
      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --dart-define=APP_VERSION=1.0.0

      - name: Build Debug APK (arm32)
        run: flutter build apk --debug --target-platform android-arm --dart-define=APP_VERSION=1.0.0
        continue-on-error: true

      # 极简上传逻辑，直接去官方默认输出目录拿安装包
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-APK-Installation-Package
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
