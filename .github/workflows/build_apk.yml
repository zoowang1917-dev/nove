name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 使用与您脚本一致的稳定版 Flutter
      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Fix CI Environment Paths
        run: |
          # 【致胜关键】保留您的原始 Android 工程，只强行覆盖本地传上来的错误路径！
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --build-name=1.0.0 --build-number=1 --dart-define=APP_VERSION=1.0.0

      - name: Build Debug APK (arm32)
        run: flutter build apk --debug --target-platform android-arm --build-name=1.0.0 --build-number=1 --dart-define=APP_VERSION=1.0.0
        continue-on-error: true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-APK-Installation-Package
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
