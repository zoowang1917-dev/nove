name: Build APK

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run:  flutter pub get

      - name: Build Debug APK (arm64，推荐安装)
        run: 
          flutter build apk --debug \
            --target-platform android-arm64 \
            --dart-define=APP_VERSION=1.0.0

      - name: Build Debug APK (arm32，旧手机用)
        run:  flutter build apk --debug \
            --target-platform android-arm \
            --dart-define=APP_VERSION=1.0.0
        continue-on-error: true

      - name: Collect APKs
        run: |
          mkdir -p dist
          find novel_local_final_v3/build -name "*.apk" | while read f; do
            echo "Found: $f"
            cp "$f" dist/
          done
          ls -lh dist/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 三省六部-InkOS-APK
          path: dist/*.apk
          retention-days: 90
