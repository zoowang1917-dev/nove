name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --dart-define=APP_VERSION=1.0.0

      - name: Build Debug APK (arm32)
        run: flutter build apk --debug --target-platform android-arm --dart-define=APP_VERSION=1.0.0

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-arm64-APK
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-arm32-APK
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
