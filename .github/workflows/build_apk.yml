name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      # 【绝招】：删掉陈旧报错的安卓文件夹，用最新版重新生成一个健康的！
      - name: Repair Android Project (Ultimate Fix)
        run: |
          rm -rf android
          flutter create --org com.novel.ai --platforms=android .
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --dart-define=APP_VERSION=1.0.0

      - name: Build Debug APK (arm32)
        run: flutter build apk --debug --target-platform android-arm --dart-define=APP_VERSION=1.0.0
        continue-on-error: true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-APK-Installation-Package
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
