name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Clean & Recreate Android Project
        run: |
          # 清除旧配置，重建适配当前 Flutter 的现代安卓框架
          rm -rf android
          flutter create --org com.novel.ai --platforms=android .
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle

      - name: Bypass Third-Party Plugin Bug (终极杀招)
        run: |
          # 强制覆写依赖，避开 9.0.0 版本的恶性崩溃 Bug！
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  package_info_plus: ^8.1.2" >> pubspec.yaml

      - name: Install dependencies
        run: |
          # 彻底清理缓存并重新拉取安全的依赖包
          flutter clean
          flutter pub get

      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --build-name=1.0.0 --build-number=1 --dart-define=APP_VERSION=1.0.0

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-APK-Installation-Package
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
