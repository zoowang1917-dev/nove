name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Clean & Rebuild Android Architecture
        run: |
          # 1. 删除残缺的旧架构，生成匹配 3.24.5 的纯净架构
          rm -rf android
          flutter create --org com.novel.ai --platforms=android .
          # 物理级精确替换：找出所有隐藏的旧版本，强制全部升级为 1.9.24
          find android -name "*.gradle" -exec sed -i 's/1.9.0/2.1.0/g' {} +
          find android -name "*.gradle" -exec sed -i 's/1.8.22/2.1.0/g' {} +
          find android -name "*.gradle" -exec sed -i 's/1.8.0/2.1.0/g' {} +


          
          # 2. 【核心破局点】为所有第三方老旧插件强行注入全局 SDK 变量
          # 伪装 flutter 对象，骗过那些写死代码的旧插件，彻底终结 null 崩溃！
          cat <<EOF >> android/build.gradle
          
          allprojects {
              ext.compileSdkVersion = 34
              ext.minSdkVersion = 23
              ext.targetSdkVersion = 34
              
              ext.flutter = [
                  compileSdkVersion: 34,
                  minSdkVersion: 23,
                  targetSdkVersion: 34
              ]
          }
          EOF
          
          # 3. 强制修改主 App 最低版本限制
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle

      - name: Install dependencies
        run: |
          # 彻底清理缓存并重新拉取依赖
          flutter clean
          flutter pub get

      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --build-name=1.0.0 --build-number=1 --dart-define=APP_VERSION=1.0.0

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: InkOS-APK-Installation-Package
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
