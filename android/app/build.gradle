buildscript {
    ext.kotlin_version = '2.1.0'
    repositories {
        google()
        mavenCentral()
    }
}

plugins {
    id "com.android.application"
    id "kotlin-android" version "2.1.0"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

android {
    namespace "com.novel.ai"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
    sourceSets { main.java.srcDirs += 'src/main/kotlin' }

    defaultConfig {
        applicationId "com.novel.ai"
        // 绝对最低：Android 6.0（API 23）— workmanager 要求
        // 推荐：API 24（Android 7.0），但 API 23 也能运行
        minSdk 23
        targetSdk 34
        versionCode localProperties.getProperty('flutter.versionCode')?.toInteger() ?: 1
        versionName localProperties.getProperty('flutter.versionName') ?: '1.0.0'
        ndk { abiFilters "arm64-v8a", "armeabi-v7a" }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            // Release 签名（Debug签名仅用于测试，上架前换成正式 keystore）
            signingConfig signingConfigs.debug

            // 开启 R8 代码压缩、混淆与优化
            minifyEnabled   true
            shrinkResources true

            // ProGuard 规则：
            // proguard-android-optimize.txt = Google 官方优化规则
            // proguard-rules.pro            = 本项目插件白名单（防止 Release 崩溃）
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'

            // Dart 层混淆（在 flutter build 命令中追加 --obfuscate --split-debug-info=build/debug-info）
            // 示例：flutter build apk --release --obfuscate --split-debug-info=build/debug-info
        }
    }

    // 分 ABI 打包（减小安装包体积）
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "armeabi-v7a"
            universalApk true
        }
    }

    lint {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }
}

flutter { source '../..' }
